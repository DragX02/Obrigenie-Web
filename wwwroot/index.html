<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obrigenie</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Obrigenie.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Crée une URL blob à partir d'un tableau d'octets reçu depuis Blazor.
        // Utilisé par ReferentielPage pour afficher un PDF dans un iframe
        // sans exposer le token JWT dans l'URL de la requête.
        window.creerUrlBlob = function (octets, typeMime) {
            const blob = new Blob([new Uint8Array(octets)], { type: typeMime });
            return URL.createObjectURL(blob);
        };

        // Libère une URL blob précédemment créée pour éviter les fuites mémoire.
        // À appeler lorsqu'un nouveau PDF est chargé ou que la page est déchargée.
        window.libererUrlBlob = function (url) {
            if (url) URL.revokeObjectURL(url);
        };
    </script>
</body>

</html>
